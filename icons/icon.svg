<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <radialGradient id="bg" cx="35%" cy="40%" r="75%">
      <stop offset="0%" stop-color="#1a2d45"/>
      <stop offset="55%" stop-color="#0d1b2e"/>
      <stop offset="100%" stop-color="#060d16"/>
    </radialGradient>
    <radialGradient id="drop1" cx="30%" cy="25%" r="70%">
      <stop offset="0%" stop-color="rgba(255,255,255,0.9)"/>
      <stop offset="40%" stop-color="rgba(190,230,255,0.6)"/>
      <stop offset="100%" stop-color="rgba(100,180,255,0.1)"/>
    </radialGradient>
    <radialGradient id="drop2" cx="30%" cy="25%" r="70%">
      <stop offset="0%" stop-color="rgba(255,255,255,0.85)"/>
      <stop offset="40%" stop-color="rgba(180,220,255,0.55)"/>
      <stop offset="100%" stop-color="rgba(90,170,245,0.08)"/>
    </radialGradient>
    <radialGradient id="drop3" cx="30%" cy="25%" r="70%">
      <stop offset="0%" stop-color="rgba(255,255,255,0.8)"/>
      <stop offset="40%" stop-color="rgba(170,215,255,0.5)"/>
      <stop offset="100%" stop-color="rgba(80,160,240,0.06)"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>

  <!-- Glass streaks -->
  <g opacity="0.18">
    <ellipse cx="160" cy="200" rx="8" ry="90" fill="#aed8f5" transform="rotate(8 160 200)"/>
    <ellipse cx="260" cy="150" rx="6" ry="70" fill="#aed8f5" transform="rotate(6 260 150)"/>
    <ellipse cx="350" cy="220" rx="7" ry="80" fill="#aed8f5" transform="rotate(10 350 220)"/>
  </g>

  <!-- Large main droplet -->
  <ellipse cx="256" cy="240" rx="92" ry="108" fill="url(#drop1)" opacity="0.22"/>
  <ellipse cx="256" cy="240" rx="92" ry="108" fill="none" stroke="rgba(200,235,255,0.55)" stroke-width="2.5"/>
  <!-- highlight 1 -->
  <ellipse cx="228" cy="206" rx="30" ry="18" fill="rgba(255,255,255,0.88)" opacity="0.9" transform="rotate(-20 228 206)"/>
  <!-- highlight 2 -->
  <ellipse cx="278" cy="218" rx="10" ry="6" fill="rgba(255,255,255,0.6)" opacity="0.7" transform="rotate(-10 278 218)"/>
  <!-- bottom shadow -->
  <ellipse cx="260" cy="308" rx="62" ry="28" fill="rgba(40,80,140,0.22)"/>

  <!-- Medium droplet left -->
  <ellipse cx="152" cy="320" rx="48" ry="56" fill="url(#drop2)" opacity="0.20"/>
  <ellipse cx="152" cy="320" rx="48" ry="56" fill="none" stroke="rgba(180,220,255,0.45)" stroke-width="2"/>
  <ellipse cx="136" cy="300" rx="16" ry="9" fill="rgba(255,255,255,0.82)" opacity="0.85" transform="rotate(-18 136 300)"/>

  <!-- Small droplet right -->
  <ellipse cx="358" cy="340" rx="32" ry="38" fill="url(#drop3)" opacity="0.18"/>
  <ellipse cx="358" cy="340" rx="32" ry="38" fill="none" stroke="rgba(170,215,255,0.38)" stroke-width="1.8"/>
  <ellipse cx="347" cy="326" rx="10" ry="6" fill="rgba(255,255,255,0.75)" opacity="0.8" transform="rotate(-15 347 326)"/>

  <!-- Rain streak particles -->
  <g opacity="0.28" stroke="rgba(180,220,250,1)" stroke-linecap="round">
    <line x1="120" y1="80" x2="112" y2="130" stroke-width="2.5"/>
    <line x1="200" y1="60" x2="193" y2="100" stroke-width="2"/>
    <line x1="300" y1="75" x2="292" y2="118" stroke-width="2.5"/>
    <line x1="390" y1="90" x2="382" y2="130" stroke-width="2"/>
    <line x1="440" y1="65" x2="433" y2="100" stroke-width="1.8"/>
    <line x1="80"  y1="100" x2="73"  y2="140" stroke-width="1.8"/>
  </g>

  <!-- App name text -->
  <text x="256" y="434" font-family="'Inter','Arial',sans-serif" font-size="52" font-weight="700"
    fill="rgba(255,255,255,0.85)" text-anchor="middle" letter-spacing="1">
    Rainy
  </text>
  <text x="256" y="484" font-family="'Inter','Arial',sans-serif" font-size="38" font-weight="400"
    fill="rgba(126,200,227,0.75)" text-anchor="middle" letter-spacing="2">
    Note
  </text>
</svg>
